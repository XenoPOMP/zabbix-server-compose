name: ${CLUSTER_NAME:-zabbix-composed}

services:
  database:   # Postgresql Database for backend.
    image: postgres:15-alpine
    container_name: zabbix-dedicated-database
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=zabbix
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:     # Zabbix backend
    image: zabbix/zabbix-server-pgsql:${ZBX_VERSION:-latest}
    container_name: zabbix-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DB_SERVER_HOST=172.20.240.1
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}

  snmptraps:  # SNMP Traps
    image: zabbix/zabbix-snmptraps:${ZBX_VERSION:-latest}
    container_name: zabbix-snmp-traps
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - snmptraps:/var/lib/zabbix/snmptraps:rw
      - mibs:/usr/share/snmp/mibs:ro
    ports:
      - "162:1162/udp"

  frontend:
    image: zabbix/zabbix-web-nginx-pgsql:${ZBX_VERSION:-latest}
    container_name: zabbix-frontend
    restart: unless-stopped
    depends_on:
      - server
    environment:
      - ZBX_SERVER_HOST=172.20.240.2
      - DB_SERVER_HOST=172.20.240.1
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=zabbix
    ports:
      - "8443:8443"
      - "${FRONT_END_PORT}:8080"
    volumes:
      - nginx:/etc/ssl/nginx:ro

  agent2:
    image: zabbix/zabbix-agent2:${ZBX_VERSION:-latest}
    container_name: zabbix-linux-agent-v2
    restart: unless-stopped
    depends_on:
      - server
    environment:
      - ZBX_HOSTNAME=172.20.240.5
      - ZBX_SERVER_HOST=172.20.240.2

volumes:
  db_data:    # This volume persists database data
  snmptraps:  # For SNMP traps
  mibs:       # For SNMP traps
  nginx:      # Frontend`s nginx files